<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API - EVORA DESIGN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Test de l'API EVORA DESIGN</h1>

        <!-- Test Connexion -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">1. Test de connexion à l'API</h2>
            <button onclick="testConnection()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                Tester la connexion
            </button>
            <div id="connectionResult" class="mt-4"></div>
        </div>

        <!-- Test Création Devis -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">2. Test création de devis</h2>
            <button onclick="testCreateDevis()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
                Créer un devis test
            </button>
            <div id="createDevisResult" class="mt-4"></div>
        </div>

        <!-- Test Lecture Devis -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">3. Test lecture des devis</h2>
            <button onclick="testReadDevis()" class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700">
                Lire les devis
            </button>
            <div id="readDevisResult" class="mt-4"></div>
        </div>

        <!-- Test Statistiques -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">4. Test statistiques</h2>
            <button onclick="testStats()" class="bg-orange-600 text-white px-4 py-2 rounded hover:bg-orange-700">
                Charger les stats
            </button>
            <div id="statsResult" class="mt-4"></div>
        </div>

        <!-- Test Tracking -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">5. Test tracking de visite</h2>
            <button onclick="testTracking()" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
                Enregistrer une visite
            </button>
            <div id="trackingResult" class="mt-4"></div>
        </div>

    </div>

    <script src="js/api-client.js"></script>
    <script>
        // Test de connexion
        async function testConnection() {
            const resultDiv = document.getElementById('connectionResult');
            resultDiv.innerHTML = '<p class="text-gray-600">Test en cours...</p>';

            try {
                const response = await EvoraAPI.StatsAPI.getDashboard();
                resultDiv.innerHTML = `
                    <div class="bg-green-50 border border-green-200 text-green-800 p-4 rounded">
                        <p class="font-bold">✅ Connexion réussie !</p>
                        <pre class="mt-2 text-sm overflow-auto">${JSON.stringify(response, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="bg-red-50 border border-red-200 text-red-800 p-4 rounded">
                        <p class="font-bold">❌ Erreur de connexion</p>
                        <p class="mt-2">${error.message}</p>
                        <p class="mt-2 text-sm">Vérifiez que :</p>
                        <ul class="list-disc ml-6 text-sm">
                            <li>La base de données est créée</li>
                            <li>Les identifiants dans api/config/database.php sont corrects</li>
                            <li>Le serveur PHP est démarré</li>
                            <li>L'URL de l'API dans js/api-client.js est correcte</li>
                        </ul>
                    </div>
                `;
            }
        }

        // Test création devis
        async function testCreateDevis() {
            const resultDiv = document.getElementById('createDevisResult');
            resultDiv.innerHTML = '<p class="text-gray-600">Création en cours...</p>';

            const testData = {
                nom: 'Test User ' + Date.now(),
                email: 'test@example.com',
                telephone: '+225 07 00 00 00 00',
                type_meuble: 'Dressing',
                budget: '500k-1m',
                description: 'Ceci est un test automatique'
            };

            try {
                const response = await EvoraAPI.DevisAPI.create(testData);
                resultDiv.innerHTML = `
                    <div class="bg-green-50 border border-green-200 text-green-800 p-4 rounded">
                        <p class="font-bold">✅ Devis créé avec succès !</p>
                        <p class="mt-2">ID: ${response.id}</p>
                        <pre class="mt-2 text-sm overflow-auto">${JSON.stringify(response, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="bg-red-50 border border-red-200 text-red-800 p-4 rounded">
                        <p class="font-bold">❌ Erreur lors de la création</p>
                        <p class="mt-2">${error.message}</p>
                    </div>
                `;
            }
        }

        // Test lecture devis
        async function testReadDevis() {
            const resultDiv = document.getElementById('readDevisResult');
            resultDiv.innerHTML = '<p class="text-gray-600">Chargement...</p>';

            try {
                const response = await EvoraAPI.DevisAPI.getAll();
                resultDiv.innerHTML = `
                    <div class="bg-green-50 border border-green-200 text-green-800 p-4 rounded">
                        <p class="font-bold">✅ ${response.total} devis trouvé(s)</p>
                        <pre class="mt-2 text-sm overflow-auto max-h-96">${JSON.stringify(response, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="bg-red-50 border border-red-200 text-red-800 p-4 rounded">
                        <p class="font-bold">❌ Erreur lors de la lecture</p>
                        <p class="mt-2">${error.message}</p>
                    </div>
                `;
            }
        }

        // Test statistiques
        async function testStats() {
            const resultDiv = document.getElementById('statsResult');
            resultDiv.innerHTML = '<p class="text-gray-600">Chargement des stats...</p>';

            try {
                const response = await EvoraAPI.StatsAPI.getDashboard();
                const stats = response.data.stats_globales;
                
                resultDiv.innerHTML = `
                    <div class="bg-green-50 border border-green-200 text-green-800 p-4 rounded">
                        <p class="font-bold">✅ Statistiques chargées</p>
                        <div class="mt-4 grid grid-cols-2 gap-4">
                            <div class="bg-white p-3 rounded">
                                <p class="text-sm text-gray-600">Visites</p>
                                <p class="text-2xl font-bold">${stats.total_visites || 0}</p>
                            </div>
                            <div class="bg-white p-3 rounded">
                                <p class="text-sm text-gray-600">Devis</p>
                                <p class="text-2xl font-bold">${stats.total_devis || 0}</p>
                            </div>
                            <div class="bg-white p-3 rounded">
                                <p class="text-sm text-gray-600">Produits</p>
                                <p class="text-2xl font-bold">${stats.total_produits || 0}</p>
                            </div>
                            <div class="bg-white p-3 rounded">
                                <p class="text-sm text-gray-600">Photos</p>
                                <p class="text-2xl font-bold">${stats.total_photos || 0}</p>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="bg-red-50 border border-red-200 text-red-800 p-4 rounded">
                        <p class="font-bold">❌ Erreur lors du chargement des stats</p>
                        <p class="mt-2">${error.message}</p>
                    </div>
                `;
            }
        }

        // Test tracking
        async function testTracking() {
            const resultDiv = document.getElementById('trackingResult');
            resultDiv.innerHTML = '<p class="text-gray-600">Enregistrement...</p>';

            try {
                const response = await EvoraAPI.StatsAPI.trackVisit('test-api.html');
                resultDiv.innerHTML = `
                    <div class="bg-green-50 border border-green-200 text-green-800 p-4 rounded">
                        <p class="font-bold">✅ Visite enregistrée</p>
                        <pre class="mt-2 text-sm overflow-auto">${JSON.stringify(response, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="bg-red-50 border border-red-200 text-red-800 p-4 rounded">
                        <p class="font-bold">❌ Erreur lors de l'enregistrement</p>
                        <p class="mt-2">${error.message}</p>
                    </div>
                `;
            }
        }
    </script>

</body>
</html>
