<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Dashboard Admin - EVORA DESIGN</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  
  <!-- Protection Admin -->
  <script src="admin-auth.js"></script>
  
  <style>
    body { font-family: 'Montserrat', sans-serif; }
    .sidebar { transition: transform 0.3s ease; }
    @media (max-width: 768px) {
      .sidebar.hidden { transform: translateX(-100%); }
    }
  </style>
</head>

<body class="bg-gray-100">

  <!-- Sidebar -->
  <aside class="sidebar fixed left-0 top-0 h-full w-64 bg-gradient-to-b from-gray-900 to-gray-800 text-white z-50">
    
    <!-- Logo -->
    <div class="p-6 border-b border-gray-700">
      <h1 class="text-2xl font-bold">EVORA DESIGN</h1>
      <p class="text-sm text-gray-400">Administration</p>
    </div>

    <!-- Navigation -->
    <nav class="p-4">
      <ul class="space-y-2">
        <li>
          <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 bg-blue-600 rounded-lg">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            Tableau de bord
          </a>
        </li>
        <li>
          <a href="products.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded-lg transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
            </svg>
            Produits
          </a>
        </li>
        <li>
          <a href="categories.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded-lg transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
            </svg>
            Catégories
          </a>
        </li>
        <li>
          <a href="devis-list.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded-lg transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            Demandes de devis
          </a>
        </li>
        <li>
          <a href="gallery.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded-lg transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            Galerie
          </a>
        </li>
        <li>
          <a href="statistics.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded-lg transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
            Statistiques
          </a>
        </li>
      </ul>
    </nav>

    <!-- Déconnexion -->
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-700">
      <button id="logoutBtn" class="flex items-center gap-3 px-4 py-3 w-full hover:bg-red-600 rounded-lg transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Déconnexion
      </button>
    </div>

  </aside>

  <!-- Contenu principal -->
  <main class="ml-64 p-8">
    
    <!-- Header -->
    <header class="mb-8">
      <h2 class="text-3xl font-bold text-gray-800 mb-2">Tableau de bord</h2>
      <p class="text-gray-600">Bienvenue, <span id="adminName">Admin</span></p>
    </header>

    <!-- Statistiques -->
    <div class="grid md:grid-cols-4 gap-6 mb-8">
      
      <!-- Visites -->
      <div class="bg-white rounded-xl shadow-lg p-6">
        <div class="flex items-center justify-between mb-4">
          <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center">
            <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </div>
        </div>
        <h3 class="text-2xl font-bold text-gray-800" id="totalVisits">0</h3>
        <p class="text-sm text-gray-600">Visites totales</p>
      </div>

      <!-- Devis -->
      <div class="bg-white rounded-xl shadow-lg p-6">
        <div class="flex items-center justify-between mb-4">
          <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
            <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
          </div>
        </div>
        <h3 class="text-2xl font-bold text-gray-800" id="totalDevis">0</h3>
        <p class="text-sm text-gray-600">Demandes de devis</p>
      </div>

      <!-- Produits -->
      <div class="bg-white rounded-xl shadow-lg p-6">
        <div class="flex items-center justify-between mb-4">
          <div class="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center">
            <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
            </svg>
          </div>
        </div>
        <h3 class="text-2xl font-bold text-gray-800" id="totalProducts">0</h3>
        <p class="text-sm text-gray-600">Produits</p>
      </div>

      <!-- Photos -->
      <div class="bg-white rounded-xl shadow-lg p-6">
        <div class="flex items-center justify-between mb-4">
          <div class="w-12 h-12 bg-orange-100 rounded-lg flex items-center justify-center">
            <svg class="w-6 h-6 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
          </div>
        </div>
        <h3 class="text-2xl font-bold text-gray-800" id="totalPhotos">0</h3>
        <p class="text-sm text-gray-600">Photos</p>
      </div>

    </div>

    <!-- Graphiques et activités récentes -->
    <div class="grid md:grid-cols-2 gap-6">
      
      <!-- Activités récentes -->
      <div class="bg-white rounded-xl shadow-lg p-6">
        <h3 class="text-xl font-bold text-gray-800 mb-4">Activités récentes</h3>
        <div id="recentActivities" class="space-y-4">
          <!-- Sera rempli dynamiquement -->
        </div>
      </div>

      <!-- Demandes en attente -->
      <div class="bg-white rounded-xl shadow-lg p-6">
        <h3 class="text-xl font-bold text-gray-800 mb-4">Demandes en attente</h3>
        <div id="pendingRequests" class="space-y-4">
          <!-- Sera rempli dynamiquement -->
        </div>
      </div>

    </div>

  </main>

<script src="../js/api-client.js"></script>
<script src="admin-auth.js"></script>
<script src="admin-dashboard.js"></script>

</body>
</html>
