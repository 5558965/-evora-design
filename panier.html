<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Votre panier d'achat EVORA DESIGN - Finalisez votre commande de meubles sur mesure">
  <meta name="robots" content="noindex, follow">
  <title>Panier - EVORA DESIGN</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.tailwindcss.com">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  
  <style>
    .cart-item {
      transition: all 0.3s ease;
    }
    .cart-item:hover {
      background-color: #f9fafb;
      transform: translateX(5px);
    }
    .delete-btn {
      transition: all 0.2s ease;
    }
    .delete-btn:hover {
      transform: scale(1.1);
    }
    .empty-cart-icon {
      font-size: 80px;
      opacity: 0.3;
    }
    .checkout-summary {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
    }
    .price-tag {
      background: linear-gradient(135deg, #6b4f3a 0%, #8b6f47 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-blue-50 via-blue-100 to-indigo-100 min-h-screen">

<!-- HEADER -->
<header class="bg-white shadow-md sticky top-0 z-50" role="banner">
  <div class="container mx-auto flex justify-between items-center p-4">
    <div class="flex items-center space-x-3">
      <img src="Images/evora.png" alt="Logo EVORA DESIGN" class="h-10 w-10 object-contain" width="40" height="40">
      <h1 class="text-2xl font-bold text-[#1e3a8a]">EVORA DESIGN</h1>
    </div>
    <a href="index.html" class="text-gray-600 hover:text-[#1e3a8a] transition flex items-center gap-2" aria-label="Retour à la page d'accueil">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
      </svg>
      Continuer mes achats
    </a>
  </div>
</header>

<!-- CONTENU PRINCIPAL -->
<main class="py-12">
  <div class="container mx-auto px-4">
    
    <!-- Titre -->
    <div class="text-center mb-12">
      <h2 class="text-4xl font-bold text-gray-800 mb-2">Mon Panier</h2>
      <p class="text-gray-600">Finalisez votre sélection de meubles sur mesure</p>
    </div>

    <div class="grid lg:grid-cols-3 gap-8">
      
      <!-- Liste des articles -->
      <div class="lg:col-span-2">
        <div class="bg-white rounded-2xl shadow-lg p-6 md:p-8">
          
          <div class="flex justify-between items-center mb-6 pb-4 border-b">
            <h3 class="text-xl font-semibold text-gray-800">Articles (<span id="itemCount">0</span>)</h3>
            <button id="clearCartBtn" class="text-red-500 hover:text-red-700 text-sm font-medium transition flex items-center gap-1" aria-label="Vider le panier">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
              Vider le panier
            </button>
          </div>

          <div id="cartItems" class="space-y-4">
            <!-- Les articles seront ajoutés dynamiquement -->
          </div>

        </div>
      </div>

      <!-- Résumé de la commande -->
      <div class="lg:col-span-1">
        <div class="bg-white rounded-2xl shadow-lg p-6 sticky top-24">
          
          <h3 class="text-xl font-semibold text-gray-800 mb-6">Résumé</h3>
          
          <div class="space-y-4 mb-6">
            <div class="flex justify-between text-gray-600">
              <span>Sous-total</span>
              <span id="subtotal" class="font-medium">0 FCFA</span>
            </div>
            <div class="flex justify-between text-gray-600">
              <span>Livraison</span>
              <span class="font-medium text-green-600">Gratuite</span>
            </div>
            <div class="border-t pt-4 flex justify-between text-lg font-bold text-gray-800">
              <span>Total</span>
              <span id="cartTotal" class="price-tag text-2xl" aria-live="polite">0 FCFA</span>
            </div>
          </div>

          <button id="checkoutBtn" class="btn-primary w-full py-4 text-lg mb-4 checkout-summary border-0 flex items-center justify-center gap-2" aria-label="Passer la commande">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            Passer la commande
          </button>

          <div class="text-center">
            <a href="index.html" class="text-sm text-gray-500 hover:text-gray-700 transition">
              ← Continuer mes achats
            </a>
          </div>

          <!-- Garanties -->
          <div class="mt-8 pt-6 border-t space-y-3">
            <div class="flex items-start gap-3 text-sm text-gray-600">
              <svg class="w-5 h-5 text-green-600 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <span>Paiement sécurisé</span>
            </div>
            <div class="flex items-start gap-3 text-sm text-gray-600">
              <svg class="w-5 h-5 text-green-600 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
              </svg>
              <span>Livraison gratuite</span>
            </div>
            <div class="flex items-start gap-3 text-sm text-gray-600">
              <svg class="w-5 h-5 text-green-600 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <span>Garantie qualité</span>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>
</main>

<script>
(function() {
  'use strict';

  const STORAGE_KEY = 'evoradesign_cart';

  function loadCart() {
    try {
      const cart = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      displayCart(cart);
    } catch (error) {
      console.error('Erreur lors du chargement du panier:', error);
      displayCart([]);
    }
  }

  function displayCart(cart) {
    const cartItems = document.getElementById('cartItems');
    const cartTotal = document.getElementById('cartTotal');
    const subtotal = document.getElementById('subtotal');
    const itemCount = document.getElementById('itemCount');

    itemCount.textContent = cart.length;

    if (cart.length === 0) {
      cartItems.innerHTML = `
        <div class="text-center py-16">
          <div class="empty-cart-icon mb-4">🛒</div>
          <h3 class="text-2xl font-semibold text-gray-700 mb-2">Votre panier est vide</h3>
          <p class="text-gray-500 mb-6">Découvrez nos magnifiques meubles sur mesure</p>
          <a href="index.html" class="btn-primary inline-block">
            Découvrir nos produits
          </a>
        </div>
      `;
      cartTotal.textContent = '0 FCFA';
      subtotal.textContent = '0 FCFA';
      return;
    }

    cartItems.innerHTML = cart.map((item, index) => `
      <div class="cart-item flex items-center gap-4 p-4 border rounded-xl">
        <div class="w-20 h-20 bg-gray-100 rounded-lg flex items-center justify-center flex-shrink-0">
          <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
          </svg>
        </div>
        <div class="flex-1">
          <h4 class="font-semibold text-gray-800 mb-1">${item.name}</h4>
          <p class="text-sm text-gray-500">Meuble sur mesure</p>
        </div>
        <div class="text-right">
          <p class="font-bold text-lg text-[#6b4f3a]">${item.price.toLocaleString('fr-FR')} FCFA</p>
        </div>
        <button class="delete-btn text-red-500 hover:text-red-700 p-2 rounded-lg hover:bg-red-50" onclick="removeItem(${index})" aria-label="Supprimer ${item.name}">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </button>
      </div>
    `).join('');

    const total = cart.reduce((sum, item) => sum + item.price, 0);
    cartTotal.textContent = `${total.toLocaleString('fr-FR')} FCFA`;
    subtotal.textContent = `${total.toLocaleString('fr-FR')} FCFA`;
  }

  window.removeItem = function(index) {
    try {
      const cart = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      cart.splice(index, 1);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
      loadCart();
      
      // Animation de suppression
      const notification = document.createElement('div');
      notification.className = 'fixed top-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50';
      notification.textContent = 'Article retiré du panier';
      document.body.appendChild(notification);
      setTimeout(() => notification.remove(), 2000);
    } catch (error) {
      console.error('Erreur lors de la suppression:', error);
    }
  };

  document.getElementById('clearCartBtn').addEventListener('click', function() {
    const cart = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    if (cart.length === 0) return;
    
    if (confirm('Êtes-vous sûr de vouloir vider le panier ?')) {
      localStorage.removeItem(STORAGE_KEY);
      loadCart();
    }
  });

  document.getElementById('checkoutBtn').addEventListener('click', function() {
    const cart = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    if (cart.length === 0) {
      alert('Votre panier est vide');
      return;
    }
    
    // Redirection vers la page de commande
    window.location.href = 'commande.html';
  });

  loadCart();
})();
</script>

<script src="js/api-client.js"></script>

</body>
</html>
